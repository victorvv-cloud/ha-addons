mqtt:
  host: "127.0.0.1"
  port: 1883
  topic_prefix: "rpi2mqtt"

home_assistant:
  discovery_messages:
    enable: true
  publish_period_msec: 1000

gpio_inputs:
  - name: "button_front_door"
    description: "Кнопка на входной двери"
    pin: 17
    pull_up: true
    active_low: true

outputs:
  - name: "garage_relay"
    description: "Реле гаража"
    pin: 27
    active_low: false
    home_assistant:
      platform: "switch"
