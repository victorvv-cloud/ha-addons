mqtt:
  host: "127.0.0.1"   # MQTT-брокер на том же Raspberry Pi
  port: 1883
  # username: "ваш_логин"   # если задавали
  # password: "ваш_пароль"  # если задавали
  topic_prefix: "rpi2mqtt"

home_assistant:
  discovery_messages:
    enable: true            # Автоматическое обнаружение сущностей в HA
  publish_period_msec: 1000 # Публикация состояния каждую секунду

gpio_inputs:
  - name: "button_front_door"
    description: "Кнопка на входной двери"
    pin: 17                 # GPIO 17 (BCM)
    pull_up: true
    active_low: true

outputs:
  - name: "garage_relay"
    description: "Реле гаража"
    pin: 27                 # GPIO 27 (BCM)
    active_low: false
    home_assistant:
      platform: "switch"    # Или "button" для импульсного режима (500 мс)